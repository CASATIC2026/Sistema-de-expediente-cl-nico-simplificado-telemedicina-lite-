services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
    networks:
      - app-network

  frontend:
    build:
      context: ./ProyectoVue
      dockerfile: Dockerfile
      args:
      - VITE_API_URL=http://localhost:8080/api
    container_name: ProyectoVue
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge