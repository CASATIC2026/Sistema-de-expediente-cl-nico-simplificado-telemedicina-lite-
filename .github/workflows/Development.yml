name: Development

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy frontend Docker
        run: |
          cd frontend
          docker build -t frontend .
          docker run -d -p 80:80 frontend

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend   # espera que frontend esté listo
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend
        run: |
          cd backend
          npm install

      - name: Deploy backend Docker
        run: |
          cd backend
          docker build -t backend .
          docker run -d -p 3000:3000 backend
