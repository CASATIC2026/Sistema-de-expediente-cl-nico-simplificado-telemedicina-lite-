jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend  # espera que el frontend esté listo
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend
        run: |
          cd backend
          npm install
          
      - name: Deploy backend Docker
        run: |
          cd backend
          docker build -t backend .
          docker run -d -p 3000:3000 backend
